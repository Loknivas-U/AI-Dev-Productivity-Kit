name: AI Test Gap Detection

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  test-gap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade anthropic

      - name: Generate diff
        id: diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > /tmp/pr_diff.txt
          if [ ! -s /tmp/pr_diff.txt ]; then
            echo "No changes to analyze"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run test gap detector
        if: steps.diff.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual workflow dispatch' }}
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
        run: |
          python test-gap-detector/detect.py \
            --diff /tmp/pr_diff.txt \
            --pr-title "${PR_TITLE}" \
            --pr-number "${PR_NUMBER}" \
            --output /tmp/gap_report.md

      - name: Post gap report comment
        if: steps.diff.outputs.has_changes == 'true' && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          payload="$(python - <<'PY'
          import json
          from pathlib import Path

          print(json.dumps({"body": Path("/tmp/gap_report.md").read_text(encoding="utf-8")}))
          PY
          )"

          curl --fail-with-body \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -d "${payload}"
