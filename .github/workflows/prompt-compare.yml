name: Prompt Compare

on:
  workflow_call:
    inputs:
      prompt_type:
        required: true
        type: string
      compare_report_json:
        required: true
        type: string
      pr_number:
        required: false
        type: string
        default: ""
      repository:
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  prompt-compare:
    runs-on: ubuntu-latest

    steps:
      - name: Render comparison report
        env:
          COMPARE_REPORT_JSON: ${{ inputs.compare_report_json }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(os.environ["COMPARE_REPORT_JSON"])
          candidate = report["candidate_metrics"]
          production = report["production_metrics"]
          deltas = report["metric_deltas"]
          metric_names = {
              "precision": "Precision",
              "recall": "Recall",
              "false_positive_rate": "False Positive Rate",
              "specificity": "Specificity",
              "consistency": "Consistency",
          }

          lines = [
              f"## 🧪 Prompt Evaluation Report — {report['prompt_type']}",
              "",
              f"### Candidate Score: {report['candidate_score']} | Production Score: {report['production_score']} | Delta: {report['delta']}",
              "",
              f"### Verdict: {report['verdict']}",
              "",
              "### Recommendation",
              report["recommendation"],
              "",
              "### Metric Breakdown",
              "| Metric | Candidate | Production | Delta |",
              "|---|---|---|---|",
          ]

          for metric, label in metric_names.items():
              lines.append(
                  f"| {label} | {candidate[metric]} | {production[metric]} | {deltas[metric]} |"
              )

          lines.extend(
              [
                  "",
                  "### What to do next",
                  "- If you want to promote: go to Actions → prompt-promote → Run workflow",
                  "- If you want to keep experimenting: edit staging/{type}_candidate.md and push again".format(
                      type=report["prompt_type"]
                  ),
                  "- This comment is a suggestion only. No changes have been made to production.",
                  "",
                  "---",
                  "*Generated by ai-dev-productivity-kit Prompt Evaluator. Human promotes. Always.*",
              ]
          )
          Path("/tmp/prompt_compare_comment.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Post comparison as PR comment
        if: inputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ inputs.repository }}
        run: |
          payload="$(python - <<'PY'
          import json
          from pathlib import Path

          print(json.dumps({"body": Path("/tmp/prompt_compare_comment.md").read_text(encoding="utf-8")}))
          PY
          )"

          curl --fail-with-body \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -d "${payload}"

      - name: Write comparison to workflow summary
        if: inputs.pr_number == ''
        run: |
          cat /tmp/prompt_compare_comment.md >> "$GITHUB_STEP_SUMMARY"
