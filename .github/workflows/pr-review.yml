name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

# pull-requests: write is required only to post the AI review comment.
# This workflow uses pull_request (not pull_request_target), so it runs
# in a sandboxed context with no access to secrets from forks.
# PR title and number are passed as environment variables, not interpolated
# directly into shell commands, preventing injection risk.
permissions:
  contents: read
  pull-requests: write

jobs:
  pr-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade anthropic requests

      - name: Generate diff
        id: diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > /tmp/pr_diff.txt
          if [ ! -s /tmp/pr_diff.txt ]; then
            echo "No changes to review"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run PR reviewer
        if: steps.diff.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual workflow dispatch' }}
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
        run: |
          python pr-reviewer/review.py \
            --diff /tmp/pr_diff.txt \
            --pr-title "${PR_TITLE}" \
            --pr-number "${PR_NUMBER}" \
            --output /tmp/review_output.md

      # Posts the generated review markdown as a single PR comment via the GitHub Issues API.
      - name: Post review comment
        if: steps.diff.outputs.has_changes == 'true' && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          payload="$(python - <<'PY'
          import json
          from pathlib import Path

          print(json.dumps({"body": Path("/tmp/review_output.md").read_text(encoding="utf-8")}))
          PY
          )"

          curl --fail-with-body \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -d "${payload}"

      - name: Post merge risk advisory
        if: steps.diff.outputs.has_changes == 'true' && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual workflow dispatch' }}
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python pr-reviewer/post_advisory.py \
            --review-file /tmp/review_output.md \
            --pr-title "${PR_TITLE}" \
            --pr-number "${PR_NUMBER}"
